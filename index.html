<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusFlow — Study Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #f7c56a;
    --accent3: #6af7c5;
    --danger: #f76a6a;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --glow: rgba(124, 106, 247, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  /* Ambient blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -200px; left: -100px; }
  .blob-2 { width: 400px; height: 400px; background: var(--accent3); bottom: -150px; right: -100px; }
  .blob-3 { width: 300px; height: 300px; background: var(--accent2); top: 50%; left: 50%; transform: translate(-50%, -50%); }

  .app {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .logo {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.03em;
  }
  .logo span { color: var(--accent); }

  .live-clock {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 100px;
    letter-spacing: 0.05em;
  }
  .live-clock b { color: var(--text); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 6px;
    margin-bottom: 28px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex: 1;
    min-width: 100px;
    padding: 10px 14px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: 11px;
    transition: all 0.2s;
    white-space: nowrap;
    text-align: center;
  }
  .tab:hover { color: var(--text); background: var(--surface2); }
  .tab.active { background: var(--accent); color: #fff; box-shadow: 0 0 20px var(--glow); }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* TIMER DISPLAY */
  .timer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .timer-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(124,106,247,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .timer-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .timer-sublabel {
    font-size: 0.85rem;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 24px;
    min-height: 20px;
  }

  /* SVG ring */
  .ring-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 28px;
  }
  .ring-wrap svg {
    transform: rotate(-90deg);
    display: block;
  }
  .ring-track { fill: none; stroke: var(--surface2); stroke-width: 6; }
  .ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s ease, stroke 0.5s ease;
    filter: drop-shadow(0 0 6px var(--accent));
  }
  .ring-time {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .ring-time .time-display {
    font-family: 'Space Mono', monospace;
    font-size: 3rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .ring-time .time-ms {
    font-family: 'Space Mono', monospace;
    font-size: 1.2rem;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border: none;
    border-radius: 100px;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 0 20px var(--glow); }
  .btn-primary:hover { background: #6a58e0; transform: translateY(-1px); box-shadow: 0 4px 30px var(--glow); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: rgba(247,106,106,0.1); }
  .btn-sm { padding: 8px 16px; font-size: 0.78rem; }
  .btn:active { transform: scale(0.97); }

  /* POMODORO */
  .pomo-modes {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .pomo-mode-btn {
    padding: 8px 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 100px;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .pomo-mode-btn:hover { color: var(--text); border-color: var(--accent); }
  .pomo-mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .pomo-sessions {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
  }
  .session-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }
  .session-dot.done { background: var(--accent); }
  .session-dot.active { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

  /* STOPWATCH LAPS */
  .laps-container {
    margin-top: 24px;
    max-height: 200px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .lap-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    border-radius: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    margin-bottom: 4px;
    background: var(--surface2);
    transition: background 0.2s;
    animation: fadeIn 0.2s ease;
  }
  .lap-item:first-child { background: rgba(124,106,247,0.15); border: 1px solid rgba(124,106,247,0.3); }
  .lap-num { color: var(--muted); }
  .lap-delta { color: var(--accent3); }
  .lap-total { color: var(--text); font-weight: 700; }

  /* CUSTOM TIMER */
  .custom-inputs {
    display: flex;
    gap: 12px;
    justify-content: center;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .time-input-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .time-input-group label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .time-input {
    width: 72px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .time-input:focus { border-color: var(--accent); }
  .colon { font-family: 'Space Mono', monospace; font-size: 1.5rem; font-weight: 700; color: var(--muted); padding-top: 20px; }

  /* QUICK PRESETS */
  .presets {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .preset-btn {
    padding: 8px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .preset-btn:hover { color: var(--accent2); border-color: var(--accent2); }

  /* CLOCK PANEL */
  .clock-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .clock-header-row h2 {
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  /* Search box */
  .tz-search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
    max-width: 420px;
  }
  .tz-search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px 10px 38px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .tz-search-input:focus { border-color: var(--accent); }
  .tz-search-input::placeholder { color: var(--muted); }
  .tz-search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.9rem;
    pointer-events: none;
  }
  .tz-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    max-height: 240px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .tz-dropdown.open { display: block; }
  .tz-option {
    padding: 10px 16px;
    cursor: pointer;
    font-size: 0.82rem;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .tz-option:last-child { border-bottom: none; }
  .tz-option:hover { background: rgba(124,106,247,0.15); }
  .tz-option .tz-flag { font-size: 1.1rem; flex-shrink: 0; }
  .tz-option .tz-name { color: var(--text); font-weight: 600; }
  .tz-option .tz-zone { color: var(--muted); font-size: 0.74rem; margin-left: auto; white-space: nowrap; }

  /* World clock grid */
  .world-clock-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
    margin-top: 4px;
  }

  .tz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px 20px;
    position: relative;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeIn 0.3s ease;
    overflow: hidden;
  }
  .tz-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 100% 0%, rgba(124,106,247,0.06) 0%, transparent 60%);
    pointer-events: none;
  }
  .tz-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .tz-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .tz-card-info { flex: 1; min-width: 0; }
  .tz-card-flag { font-size: 1.6rem; margin-bottom: 4px; }
  .tz-card-country {
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tz-card-zone {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.04em;
  }
  .tz-delete-btn {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .tz-delete-btn:hover { background: rgba(247,106,106,0.15); color: var(--danger); border-color: var(--danger); }
  .tz-time {
    font-family: 'Space Mono', monospace;
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 4px;
  }
  .tz-date-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .tz-date {
    font-size: 0.72rem;
    color: var(--muted);
  }
  .tz-offset {
    font-size: 0.7rem;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    background: rgba(124,106,247,0.12);
    padding: 2px 8px;
    border-radius: 100px;
  }
  .tz-empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .tz-empty span { font-size: 2rem; display: block; margin-bottom: 10px; }

  .digital-big {
    font-family: 'Space Mono', monospace;
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .digital-date {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Session counter */
  .stats-row {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }
  .stat-box {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    text-align: center;
  }
  .stat-box .stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-box .stat-key {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Progress ring util */
  .ring-break .ring-progress { stroke: var(--accent3); filter: drop-shadow(0 0 6px var(--accent3)); }
  .ring-long-break .ring-progress { stroke: var(--accent2); filter: drop-shadow(0 0 6px var(--accent2)); }
  .ring-custom .ring-progress { stroke: var(--accent2); filter: drop-shadow(0 0 6px var(--accent2)); }
  .ring-stopwatch .ring-progress { stroke: var(--accent3); filter: drop-shadow(0 0 6px var(--accent3)); }

  /* Notification bar */
  .notif {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--accent);
    color: #fff;
    padding: 12px 28px;
    border-radius: 100px;
    font-size: 0.88rem;
    font-weight: 700;
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .notif.show { transform: translateX(-50%) translateY(0); }

  .spacer { height: 16px; }

  /* Responsive */
  @media (max-width: 480px) {
    .ring-time .time-display { font-size: 2.2rem; }
    header { flex-direction: column; gap: 12px; text-align: center; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="notif" id="notif">⏰ Time's up!</div>

<div class="app">
  <header>
    <div class="logo">Focus<span>Flow</span></div>
    <div class="live-clock" id="liveClockHeader"><b id="headerTime">00:00:00</b> <span id="headerAmPm">AM</span></div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('clock')">🕐 Clock</button>
    <button class="tab" onclick="switchTab('pomodoro')">🍅 Pomodoro</button>
    <button class="tab" onclick="switchTab('stopwatch')">⏱ Stopwatch</button>
    <button class="tab" onclick="switchTab('custom')">⏳ Custom</button>
  </div>

  <!-- CLOCK PANEL -->
  <div class="panel active" id="panel-clock">

    <!-- Local time bar -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
      <div>
        <div style="font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Your Local Time</div>
        <div class="digital-big" id="digitalClock" style="font-size:2rem;">12:00:00</div>
        <div class="digital-date" id="digitalDate">Loading...</div>
      </div>
      <div style="text-align:right;">
        <div id="digitalAmPm" style="font-size:1.4rem;color:var(--accent);font-weight:800;font-family:'Space Mono',monospace;">AM</div>
        <div id="localTzName" style="font-size:0.72rem;color:var(--muted);margin-top:4px;"></div>
      </div>
    </div>

    <!-- Search + Add -->
    <div class="clock-header-row">
      <h2>🌍 World Clocks</h2>
      <div class="tz-search-wrap">
        <span class="tz-search-icon">🔍</span>
        <input class="tz-search-input" id="tzSearch" type="text" placeholder="Search country or city..." autocomplete="off" oninput="filterTz()" onfocus="openTzDrop()" onblur="closeTzDrop()">
        <div class="tz-dropdown" id="tzDropdown"></div>
      </div>
    </div>

    <!-- World clock cards -->
    <div class="world-clock-grid" id="worldClockGrid"></div>

    <!-- Stats -->
    <div class="stats-row" style="margin-top:20px;">
      <div class="stat-box">
        <div class="stat-val" id="pomoDoneCount">0</div>
        <div class="stat-key">Pomodoros Done</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="focusMin">0</div>
        <div class="stat-key">Focus Minutes</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="breakMin">0</div>
        <div class="stat-key">Break Minutes</div>
      </div>
    </div>
  </div>

  <!-- POMODORO PANEL -->
  <div class="panel" id="panel-pomodoro">
    <div class="timer-card" id="pomodoroCard">
      <div class="timer-label">Pomodoro Timer</div>
      <div class="timer-sublabel" id="pomoSubLabel">Ready to focus?</div>

      <div class="pomo-modes">
        <button class="pomo-mode-btn active" onclick="setPomoMode('focus')">Focus 25m</button>
        <button class="pomo-mode-btn" onclick="setPomoMode('short')">Short Break 5m</button>
        <button class="pomo-mode-btn" onclick="setPomoMode('long')">Long Break 15m</button>
      </div>

      <div class="ring-wrap">
        <svg width="220" height="220" viewBox="0 0 220 220">
          <circle class="ring-track" cx="110" cy="110" r="96"/>
          <circle class="ring-progress" id="pomoRing" cx="110" cy="110" r="96"
            stroke-dasharray="603" stroke-dashoffset="0"/>
        </svg>
        <div class="ring-time">
          <div class="time-display" id="pomoDisplay">25:00</div>
          <div class="time-ms" id="pomoModeLabel">FOCUS</div>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-secondary btn-sm" onclick="resetPomo()">↺ Reset</button>
        <button class="btn btn-primary" id="pomoBtn" onclick="togglePomo()">▶ Start</button>
        <button class="btn btn-secondary btn-sm" onclick="skipPomo()">⏭ Skip</button>
      </div>

function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }
function fmtTime(sec) {
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  return h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}

function showNotif(msg, color = 'var(--accent)') {

function playBeep(freq = 880, dur = 0.3) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
    setTimeout(() => ctx.close(), 1000);
  } catch(e) {}
}

function playDone() {
  [880,1100,1320].forEach((f,i) => setTimeout(() => playBeep(f, 0.25), i*150));
}

// Active world clocks (stored as tz strings)
let activeClocks = ['Asia/Kolkata','America/New_York','Europe/London','Asia/Tokyo','Asia/Dubai'];

function getOffsetStr(tz) {
  try {
    const now = new Date();
    const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
    const fmt = new Intl.DateTimeFormat('en', { timeZone: tz, timeZoneName: 'short' });
    const parts = fmt.formatToParts(now);
    const tzPart = parts.find(p => p.type === 'timeZoneName');
    return tzPart ? tzPart.value : '';
  } catch(e) { return ''; }
}

function getTzTime(tz) {
  try {
    const now = new Date();
    const fmt12 = new Intl.DateTimeFormat('en-US', { timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
    const fmtDate = new Intl.DateTimeFormat('en-US', { timeZone: tz, weekday: 'short', month: 'short', day: 'numeric' });
    const parts = fmt12.formatToParts(now);
    const get = t => (parts.find(p=>p.type===t)||{}).value || '';
    const timeStr = `${get('hour')}:${get('minute')}:${get('second')}`;
    const ampm = get('dayPeriod');
    const dateStr = fmtDate.format(now);
    return { timeStr, ampm, dateStr };
  } catch(e) { return { timeStr:'--:--:--', ampm:'', dateStr:'' }; }
}

function renderWorldClocks() {
  const grid = document.getElementById('worldClockGrid');
  if (activeClocks.length === 0) {
    grid.innerHTML = `<div class="tz-empty"><span>🌍</span>No clocks added yet.<br>Search a country above to add one.</div>`;
    return;
  }
  grid.innerHTML = activeClocks.map((tz, idx) => {
    const entry = TZ_LIST.find(t => t.tz === tz) || { flag:'🌐', name: tz, city: tz };
    const { timeStr, ampm, dateStr } = getTzTime(tz);
    const offset = getOffsetStr(tz);
    return `
      <div class="tz-card" id="tzcard-${idx}">
        <div class="tz-card-top">
          <div class="tz-card-info">
            <div class="tz-card-flag">${entry.flag}</div>
            <div class="tz-card-country">${entry.name}</div>
            <div class="tz-card-zone">${entry.city}</div>
          </div>
          <button class="tz-delete-btn" onclick="removeClock(${idx})" title="Remove">✕</button>
        </div>
        <div class="tz-time" id="tztime-${idx}">${timeStr} <span style="font-size:0.9rem;color:var(--accent)">${ampm}</span></div>
        <div class="tz-date-row">
          <div class="tz-date" id="tzdate-${idx}">${dateStr}</div>
          <div class="tz-offset">${offset}</div>
        </div>
      </div>`;
  }).join('');
}

function updateWorldClockTimes() {
  activeClocks.forEach((tz, idx) => {
    const te = document.getElementById(`tztime-${idx}`);
    const de = document.getElementById(`tzdate-${idx}`);
    if (!te) return;
    const { timeStr, ampm, dateStr } = getTzTime(tz);
    te.innerHTML = `${timeStr} <span style="font-size:0.9rem;color:var(--accent)">${ampm}</span>`;
    if (de) de.textContent = dateStr;
  });
}

function removeClock(idx) {
  activeClocks.splice(idx, 1);
  renderWorldClocks();
}

// ─── TZ SEARCH DROPDOWN ───────────────────────────────────────────────────
let dropCloseTimeout = null;

function filterTz() {
  const q = document.getElementById('tzSearch').value.toLowerCase().trim();
  const drop = document.getElementById('tzDropdown');
  const filtered = q.length < 1
    ? TZ_LIST.slice(0, 30)
    : TZ_LIST.filter(t =>
        t.name.toLowerCase().includes(q) ||
        t.city.toLowerCase().includes(q) ||
        t.tz.toLowerCase().includes(q)
      ).slice(0, 30);

  drop.innerHTML = filtered.length === 0
    ? '<div class="tz-option" style="color:var(--muted)">No results found</div>'
    : filtered.map(t => `
        <div class="tz-option" onmousedown="addClock('${t.tz}')">
          <span class="tz-flag">${t.flag}</span>
          <span class="tz-name">${t.name}</span>
          <span class="tz-zone">${t.city}</span>
        </div>`).join('');
  drop.classList.add('open');
}

function openTzDrop() {
  clearTimeout(dropCloseTimeout);
  filterTz();
}

function closeTzDrop() {
  dropCloseTimeout = setTimeout(() => {
    document.getElementById('tzDropdown').classList.remove('open');
  }, 200);
}

function addClock(tz) {
  if (!activeClocks.includes(tz)) {
    activeClocks.push(tz);
    renderWorldClocks();
  }
  document.getElementById('tzSearch').value = '';
  document.getElementById('tzDropdown').classList.remove('open');
}

// ─── LIVE CLOCK ────────────────────────────────────────────────────────────
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function updateClock() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const h12 = h % 12 || 12, ampm = h < 12 ? 'AM' : 'PM';

  document.getElementById('digitalClock').textContent = `${pad(h12)}:${pad(m)}:${pad(s)}`;
  document.getElementById('digitalAmPm').textContent = ampm;
  document.getElementById('digitalDate').textContent =
    `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

  // local tz name
  try {
    const tzName = Intl.DateTimeFormat().resolvedOptions().timeZone;
    document.getElementById('localTzName').textContent = tzName;
  } catch(e) {}

  // Header
  document.getElementById('headerTime').textContent = `${pad(h12)}:${pad(m)}:${pad(s)}`;
  document.getElementById('headerAmPm').textContent = ampm;

  // World clocks (update every second via shared interval)
  updateWorldClockTimes();
}
setInterval(updateClock, 1000);
updateClock();
renderWorldClocks();

// ─── POMODORO ──────────────────────────────────────────────────────────────
const POMO_MODES = { focus: 25*60, short: 5*60, long: 15*60 };
const POMO_LABELS = { focus: 'FOCUS', short: 'SHORT BREAK', long: 'LONG BREAK' };
const POMO_COLORS = { focus: 'var(--accent)', short: 'var(--accent3)', long: 'var(--accent2)' };
const POMO_GLOWS  = { focus: 'var(--glow)', short: 'rgba(106,247,197,0.3)', long: 'rgba(247,197,106,0.3)' };

let pomoMode = 'focus', pomoTotal = 1500, pomoLeft = 1500;
let pomoRunning = false, pomoInterval = null;
let pomoSession = 0, pomoFocusDone = 0;
let totalFocusSec = 0, totalBreakSec = 0;

function renderPomoSessions() {
  const wrap = document.getElementById('pomoSessions');
  wrap.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const d = document.createElement('div');
    d.className = 'session-dot' + (i < pomoFocusDone ? ' done' : '') + (i === pomoFocusDone && pomoMode === 'focus' && pomoRunning ? ' active' : '');
    wrap.appendChild(d);
  }
}

function setPomoMode(mode) {
  if (pomoRunning) return;
  pomoMode = mode;
  pomoTotal = POMO_MODES[mode]; pomoLeft = pomoTotal;
  document.querySelectorAll('.pomo-mode-btn').forEach((b,i) => b.classList.toggle('active', ['focus','short','long'][i] === mode));
  const ring = document.getElementById('pomoRing');
  ring.style.stroke = POMO_COLORS[mode];
  ring.style.filter = `drop-shadow(0 0 6px ${POMO_COLORS[mode]})`;
  document.getElementById('pomoModeLabel').textContent = POMO_LABELS[mode];
  document.getElementById('pomoModeLabel').style.color = POMO_COLORS[mode];
  updatePomoDisplay();
}

function updatePomoDisplay() {
  const pct = pomoLeft / pomoTotal;
  document.getElementById('pomoDisplay').textContent = fmtTime(pomoLeft);
  document.getElementById('pomoRing').setAttribute('stroke-dashoffset', CIRC * (1 - pct));
  renderPomoSessions();
}

function togglePomo() {
  if (pomoRunning) {
    clearInterval(pomoInterval); pomoRunning = false;
    document.getElementById('pomoBtn').innerHTML = '▶ Resume';
    document.getElementById('pomoSubLabel').textContent = 'Paused';
  } else {
    pomoRunning = true;
    document.getElementById('pomoBtn').innerHTML = '⏸ Pause';
    document.getElementById('pomoSubLabel').textContent = pomoMode === 'focus' ? '🎯 Stay focused!' : '☕ Rest up!';
    pomoInterval = setInterval(() => {
      if (pomoLeft <= 0) {
        clearInterval(pomoInterval); pomoRunning = false;
        playDone();
        if (pomoMode === 'focus') {
          totalFocusSec += pomoTotal; pomoFocusDone++;
          document.getElementById('pomoDoneCount').textContent = pomoFocusDone;
          document.getElementById('focusMin').textContent = Math.floor(totalFocusSec/60);
          showNotif('🎯 Focus session done! Take a break.', 'var(--accent)');
          if (pomoFocusDone >= 4) { pomoFocusDone = 0; autoSwitchPomo('long'); }
          else autoSwitchPomo('short');
        } else {
          totalBreakSec += pomoTotal;
          document.getElementById('breakMin').textContent = Math.floor(totalBreakSec/60);
          showNotif('✅ Break over! Back to focus.', 'var(--accent3)');
          autoSwitchPomo('focus');
        }
        return;
      }
      pomoLeft--;
      updatePomoDisplay();
    }, 1000);
  }
  renderPomoSessions();
}

function autoSwitchPomo(mode) {
  setPomoMode(mode);
  document.getElementById('pomoSubLabel').textContent = mode === 'focus' ? 'Ready to focus?' : 'Ready for a break?';
  document.getElementById('pomoBtn').innerHTML = '▶ Start';
}

function resetPomo() {
  clearInterval(pomoInterval); pomoRunning = false;
  pomoLeft = pomoTotal;
  document.getElementById('pomoBtn').innerHTML = '▶ Start';
  document.getElementById('pomoSubLabel').textContent = 'Ready to focus?';
  updatePomoDisplay();
}

function skipPomo() {
  clearInterval(pomoInterval); pomoRunning = false;
  const next = pomoMode === 'focus' ? 'short' : 'focus';
  autoSwitchPomo(next);
}

setPomoMode('focus');

// ─── STOPWATCH ─────────────────────────────────────────────────────────────
let swRunning = false, swStart = 0, swElapsed = 0, swInterval = null;
let swLaps = [], swLastLap = 0;

function toggleSw() {
  if (swRunning) {
    clearInterval(swInterval); swRunning = false;
    swElapsed += Date.now() - swStart;
    document.getElementById('swBtn').innerHTML = '▶ Resume';
    document.getElementById('swSubLabel').textContent = 'Paused';
  } else {
    swRunning = true; swStart = Date.now();
    document.getElementById('swBtn').innerHTML = '⏸ Pause';
    document.getElementById('swSubLabel').textContent = 'Running...';
    swInterval = setInterval(updateSw, 43);
  }
}

function updateSw() {
  const total = swElapsed + Date.now() - swStart;
  const totalSec = Math.floor(total / 1000);
  const ms = total % 1000;
  document.getElementById('swDisplay').textContent = fmtTime(totalSec);
  document.getElementById('swMs').textContent = '.' + String(ms).padStart(3,'0');
  const offset = CIRC - (CIRC * ((totalSec % 60) / 60));
  document.getElementById('swRing').setAttribute('stroke-dashoffset', offset);
}

function lapSw() {
  if (!swRunning && swElapsed === 0) return;
  const total = swElapsed + (swRunning ? Date.now() - swStart : 0);
  const delta = total - swLastLap; swLastLap = total;
  swLaps.unshift({ n: swLaps.length + 1, delta, total });
  renderLaps();
}

function renderLaps() {
  const c = document.getElementById('lapsContainer');
  c.innerHTML = swLaps.map((l,i) => `
    <div class="lap-item">
      <span class="lap-num">Lap ${l.n}</span>
      <span class="lap-delta">+${fmtTime(Math.floor(l.delta/1000))}.${String(l.delta%1000).padStart(3,'0').slice(0,2)}</span>
      <span class="lap-total">${fmtTime(Math.floor(l.total/1000))}.${String(l.total%1000).padStart(3,'0').slice(0,2)}</span>
    </div>`).join('');
}

function resetSw() {
  clearInterval(swInterval); swRunning = false;
  swElapsed = 0; swLastLap = 0; swLaps = [];
  document.getElementById('swDisplay').textContent = '00:00';
  document.getElementById('swMs').textContent = '.000';
  document.getElementById('swRing').setAttribute('stroke-dashoffset', CIRC);
  document.getElementById('swBtn').innerHTML = '▶ Start';
  document.getElementById('swSubLabel').textContent = 'Ready when you are';
  document.getElementById('lapsContainer').innerHTML = '';
}

// ─── CUSTOM TIMER ──────────────────────────────────────────────────────────
let custTotal = 25*60, custLeft = 25*60, custRunning = false, custInterval = null;

function clampInput(el, max) {
  let v = parseInt(el.value) || 0;
  if (v < 0) v = 0; if (v > max) v = max;
  el.value = v;
  if (!custRunning) syncCustomFromInputs();
}

function syncCustomFromInputs() {
  const h = parseInt(document.getElementById('custH').value) || 0;
  const m = parseInt(document.getElementById('custM').value) || 0;
  const s = parseInt(document.getElementById('custS').value) || 0;
  custTotal = h*3600 + m*60 + s; custLeft = custTotal;
  updateCustomDisplay();
}

function setCustomPreset(h,m,s) {
  document.getElementById('custH').value = h;
  document.getElementById('custM').value = m;
  document.getElementById('custS').value = s;
  resetCustom();
  syncCustomFromInputs();
}

function updateCustomDisplay() {
  const pct = custTotal > 0 ? custLeft / custTotal : 0;
  document.getElementById('custDisplay').textContent = fmtTime(custLeft);
  document.getElementById('custPercent').textContent = Math.round(pct*100) + '%';
  document.getElementById('custRing').setAttribute('stroke-dashoffset', CIRC * (1 - pct));
}

function toggleCustom() {
  if (custTotal === 0) return;
  if (custRunning) {
    clearInterval(custInterval); custRunning = false;
    document.getElementById('custBtn').innerHTML = '▶ Resume';
    document.getElementById('customSubLabel').textContent = 'Paused';
    document.getElementById('customInputs').style.opacity = '1';
    document.getElementById('customInputs').style.pointerEvents = 'auto';
  } else {
    if (custLeft === 0) { resetCustom(); return; }
    custRunning = true;
    document.getElementById('custBtn').innerHTML = '⏸ Pause';
    document.getElementById('customSubLabel').textContent = '⏳ Timer running...';
    document.getElementById('customInputs').style.opacity = '0.4';
    document.getElementById('customInputs').style.pointerEvents = 'none';
    custInterval = setInterval(() => {
      if (custLeft <= 0) {
        clearInterval(custInterval); custRunning = false;
        playDone();
        showNotif('⏳ Timer finished!', 'var(--accent2)');
        document.getElementById('custBtn').innerHTML = '↺ Restart';
        document.getElementById('customSubLabel').textContent = 'Done! 🎉';
        document.getElementById('customInputs').style.opacity = '1';
        document.getElementById('customInputs').style.pointerEvents = 'auto';
        return;
      }
      custLeft--;
      updateCustomDisplay();
    }, 1000);
  }
}

function resetCustom() {
  clearInterval(custInterval); custRunning = false;
  custLeft = custTotal;
  document.getElementById('custBtn').innerHTML = '▶ Start';
  document.getElementById('customSubLabel').textContent = 'Set your time below';
  document.getElementById('customInputs').style.opacity = '1';
  document.getElementById('customInputs').style.pointerEvents = 'auto';
  updateCustomDisplay();
}

syncCustomFromInputs();
</script>
